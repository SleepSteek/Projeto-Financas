name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "::error::Secret SUPABASE_URL is missing!"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then echo "::error::Secret SUPABASE_ANON_KEY is missing!"; exit 1; fi
          if [ -z "${{ secrets.GMAIL_CLIENT_ID }}" ]; then echo "::error::Secret GMAIL_CLIENT_ID is missing!"; exit 1; fi
          echo "All secrets are present ✓"

      - name: Inject secrets into JS files
        run: |
          node -e "
          const fs = require('fs');
          const replaceInFile = (path, substitutions) => {
            let content = fs.readFileSync(path, 'utf8');
            for (const [token, value] of Object.entries(substitutions)) {
              if (!value) continue;
              content = content.split(token).join(value);
            }
            fs.writeFileSync(path, content);
            console.log('Processed ' + path);
          };

          replaceInFile('js/supabase.js', {
            '__SUPABASE_URL__': process.env.SUPABASE_URL,
            '__SUPABASE_ANON_KEY__': process.env.SUPABASE_ANON_KEY
          });

          replaceInFile('js/gmail.js', {
            '__GMAIL_CLIENT_ID__': process.env.GMAIL_CLIENT_ID
          });
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}

      - name: Verify Injection (Debug)
        run: |
          echo "Verificando se o placeholder ainda existe no arquivo final..."
          if grep -q "__SUPABASE_URL__" js/supabase.js; then
            echo "::error::ERRO: O placeholder ainda está no arquivo! A substituição falhou."
            exit 1
          else
            echo "Sucesso: Placeholder substituído com sucesso."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
