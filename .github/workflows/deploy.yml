name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "::error::Secret SUPABASE_URL is missing!"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then echo "::error::Secret SUPABASE_ANON_KEY is missing!"; exit 1; fi
          if [ -z "${{ secrets.GMAIL_CLIENT_ID }}" ]; then echo "::error::Secret GMAIL_CLIENT_ID is missing!"; exit 1; fi
          echo "All secrets are present ✓"

      - name: Inject secrets into JS files
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" js/supabase.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" js/supabase.js
          sed -i "s|__GMAIL_CLIENT_ID__|${{ secrets.GMAIL_CLIENT_ID }}|g" js/gmail.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
